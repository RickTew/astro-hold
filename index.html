<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstroHold</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }

    #hud {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      font-family: 'Courier New', monospace;
      color: #cce8ff;
    }
    #hud * { pointer-events: auto; }

    #phase-display {
      position: absolute;
      top: 18px; left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      letter-spacing: 4px;
      color: #66ccff;
      text-shadow: 0 0 12px #0088ff;
    }

    #team-label-def {
      position: absolute;
      top: 8px; left: 20px;
      font-size: 13px;
      letter-spacing: 3px;
      color: #66aaff;
      text-shadow: 0 0 8px #0066cc;
    }

    #team-label-att {
      position: absolute;
      top: 8px; right: 20px;
      font-size: 13px;
      letter-spacing: 3px;
      color: #ff6666;
      text-shadow: 0 0 8px #cc0000;
      text-align: right;
    }

    #credits-display {
      position: absolute;
      top: 26px; left: 20px;
      font-size: 14px;
      color: #aaddff;
    }

    #att-credits-display {
      position: absolute;
      top: 26px; right: 20px;
      font-size: 14px;
      color: #ffaaaa;
      text-align: right;
    }

    /* Bottom bar — now just hosts the READY/BATTLE button. Shops moved up
       to their own corner panels (top-left = Robots, top-right = Cyborgs)
       so they never crash into each other. */
    #bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 16px;
      background: rgba(0, 0, 0, 0.45);
    }

    /* Robot shop — top-left corner panel below the ROBOTS credits header. */
    #top-robot-shop {
      position: absolute;
      top: 52px;
      left: 12px;
      max-width: 52vw;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px;
      border: 1px solid #1a4466;
      background: rgba(0, 8, 20, 0.75);
    }

    /* Cyborg shop — top-right corner panel below the CYBORGS credits header. */
    #top-cyborg-shop {
      position: absolute;
      top: 52px;
      right: 12px;
      max-width: 36vw;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px;
      border: 1px solid #441122;
      background: rgba(20, 0, 8, 0.75);
    }

    .shop-panel {
      /* layout handled by #top-robot-shop / #top-cyborg-shop above */
    }

    .att-panel {
      /* tinting handled inline on #top-cyborg-shop */
    }

    .panel-label {
      font-size: 11px;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
      white-space: nowrap;
      color: #6699bb;
    }

    .att-panel .panel-label { color: #aa6677; }

    .shop-btn, .att-btn {
      padding: 8px 14px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      white-space: nowrap;
      transition: background 0.1s, border-color 0.1s;
    }

    .shop-btn {
      background: #0a1e33;
      border: 1px solid #1a4466;
      color: #88bbdd;
    }
    .shop-btn:hover { background: #102840; border-color: #2266aa; }
    .shop-btn.selected {
      background: #0e3055;
      border-color: #00aaff;
      color: #00eeff;
      text-shadow: 0 0 6px #00aaff;
    }
    /* Preview pieces — single-angle Meshy renders pending full rotations.
       Dimmer/dashed border so they're visually distinct from production. */
    .shop-btn.preview {
      border-style: dashed;
      opacity: 0.85;
      color: #7799bb;
    }

    /* Insufficient credits — greyed out so failed placements aren't silent. */
    .shop-btn.insufficient, .att-btn.insufficient {
      opacity: 0.35;
      cursor: not-allowed;
      filter: grayscale(0.5);
    }

    .att-btn {
      background: #1a0008;
      border: 1px solid #661122;
      color: #ddaaaa;
    }
    .att-btn:hover { background: #2a0010; border-color: #aa2244; color: #ffbbbb; }

    #battle-btn, #plan-battle-btn {
      background: #2a0000;
      border: 2px solid #aa2200;
      color: #ff8866;
      padding: 10px 24px;
      font-size: 17px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      white-space: nowrap;
      flex-shrink: 0;
      align-self: center;
      transition: background 0.1s, border-color 0.1s;
    }
    #battle-btn:hover, #plan-battle-btn:hover {
      background: #440000;
      border-color: #ff4400;
      color: #ffaa88;
    }

    /* Plan-phase bottom bar — narrower than build bar, just instructions + Battle */
    #plan-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(0, 0, 0, 0.5);
    }
    #plan-instructions {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-family: 'Courier New', monospace;
      color: #99bbcc;
      font-size: 12px;
      line-height: 1.4;
    }
    #plan-instructions strong {
      color: #ffee66;
      letter-spacing: 2px;
      font-size: 13px;
    }

    /* Selected-piece panel — top-right corner during planning */
    #plan-selection {
      position: absolute;
      top: 60px;
      right: 20px;
      width: 240px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid #335577;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #aaccdd;
      line-height: 1.5;
    }
    .plan-sel-header {
      font-size: 13px;
      letter-spacing: 1px;
      margin-bottom: 4px;
      text-shadow: 0 0 6px currentColor;
    }
    .plan-sel-ap {
      color: #ffee88;
      margin-bottom: 6px;
    }
    .plan-sel-ap strong { color: #fff; font-size: 14px; }
    .plan-sel-queue {
      color: #88aabb;
      font-size: 11px;
      padding-top: 4px;
      border-top: 1px solid #334455;
    }
    .plan-sel-queue em { color: #556677; }

    /* Compass-rose popup — opens with shift+click on a placed firing structure
       during BUILD. Lets the player pay credits to add extra fire-arc facings.
       Positioned absolutely; Game projects the structure's world position to
       screen coords and pins the rose there on open. */
    #compass-rose {
      position: absolute;
      transform: translate(-50%, -50%);
      display: grid;
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: auto repeat(3, 44px);
      gap: 4px;
      padding: 8px;
      background: rgba(0, 8, 20, 0.92);
      border: 1px solid #2266aa;
      box-shadow: 0 0 18px rgba(0, 80, 160, 0.45);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: #aaccdd;
    }
    #compass-rose .rose-title {
      grid-column: 1 / 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #88ccff;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    #compass-rose .rose-title span { flex: 1; text-align: center; }
    #compass-rose .rose-close-btn {
      width: 20px; height: 20px;
      padding: 0;
      background: transparent;
      border: 1px solid #335577;
      color: #99bbcc;
      font-family: inherit;
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }
    #compass-rose .rose-close-btn:hover {
      background: #2a0010;
      border-color: #aa2244;
      color: #ffbbbb;
    }
    #compass-rose .rose-footer {
      grid-column: 1 / 4;
      margin-top: 4px;
      display: flex; justify-content: center;
    }
    #compass-rose .rose-refund-btn {
      flex: 1;
      padding: 6px 8px;
      background: #2a0008;
      border: 1px solid #661122;
      color: #ddaaaa;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
    }
    #compass-rose .rose-refund-btn:hover {
      background: #440010;
      border-color: #aa2244;
      color: #ffbbbb;
    }
    #compass-rose .rose-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px;
      cursor: pointer;
      background: #0a1e33;
      border: 1px solid #1a4466;
      color: #88bbdd;
      font-family: inherit;
      font-size: 13px;
      line-height: 1;
    }
    #compass-rose .rose-btn:hover { background: #102840; border-color: #2266aa; }
    #compass-rose .rose-btn.active {
      background: #0e3055;
      border-color: #00aaff;
      color: #00eeff;
      cursor: default;
      text-shadow: 0 0 6px #00aaff;
    }
    #compass-rose .rose-btn.unaffordable {
      opacity: 0.4;
      cursor: not-allowed;
      filter: grayscale(0.4);
    }
    #compass-rose .rose-btn .rose-arrow { font-size: 16px; line-height: 1; }
    #compass-rose .rose-btn .rose-cost  { font-size: 9px; color: #99cc66; }
    #compass-rose .rose-btn .rose-on    { font-size: 8px; color: #66ccff; letter-spacing: 1px; }
    #compass-rose .rose-center {
      background: transparent;
      border: 1px dashed #335577;
      color: #6699bb;
      font-size: 9px;
      display: flex; align-items: center; justify-content: center;
      cursor: default;
    }

    /* Combat history log — right-rail D&D turn log. Visible during BATTLE
       and the win/lose overlay so the player can review what happened. Hidden
       during BUILD (the cyborg shop occupies this corner) and PLAN (the
       plan-selection panel does). */
    #combat-log {
      position: absolute;
      top: 60px;
      right: 12px;
      width: 280px;
      max-height: calc(100vh - 160px);
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid #224466;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.45;
      color: #99bbcc;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    #combat-log .log-turn {
      color: #ffcc66;
      font-weight: bold;
      letter-spacing: 1px;
      margin: 6px 0 4px;
      border-bottom: 1px dashed #443322;
      padding-bottom: 2px;
    }
    #combat-log .log-turn:first-child { margin-top: 0; }
    #combat-log .log-entry { padding: 1px 0; }
    #combat-log .log-entry.defender { color: #88bbdd; }
    #combat-log .log-entry.attacker { color: #dd8888; }
    #combat-log .log-entry.neutral  { color: #ffaa44; font-weight: bold; }
    #combat-log .log-empty { color: #556677; font-style: italic; }

    #game-message {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 52px;
      letter-spacing: 6px;
      text-shadow: 0 0 24px currentColor;
      pointer-events: none;
      text-align: center;
    }
    #game-message small {
      display: block;
      font-size: 16px;
      letter-spacing: 2px;
      margin-top: 12px;
      opacity: 0.7;
    }

    #loading-screen {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
      letter-spacing: 3px;
      color: #4488aa;
    }

    .hidden { display: none !important; }

    /* Single-player gating — the AI's shop panel + credits + team label all
       carry .ai-side after setPlayerSide() runs, hiding them entirely so the
       player can't see or interact with opponent intel. */
    .ai-side { display: none !important; }

    /* ── Side picker (full-screen modal shown after asset preload) ───────
       Two team cards with hero sprite + role tagline + CTA button. */
    #side-picker {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.06) 0%, transparent 1px),
        radial-gradient(circle at 75% 70%, rgba(255, 255, 255, 0.04) 0%, transparent 1px),
        radial-gradient(circle at 40% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 1px),
        radial-gradient(ellipse at center, rgba(12, 18, 32, 0.92) 0%, rgba(0, 0, 0, 0.98) 70%);
      font-family: 'Courier New', monospace;
      z-index: 100;
    }
    #side-picker .sp-title {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-size: 14px;
      letter-spacing: 12px;
      color: #6ac4ff;
      text-shadow: 0 0 14px rgba(0, 160, 240, 0.45);
    }
    #side-picker .sp-title::before,
    #side-picker .sp-title::after {
      content: '';
      width: 70px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #6ac4ff);
      opacity: 0.55;
    }
    #side-picker .sp-title::after { background: linear-gradient(90deg, #6ac4ff, transparent); }
    #side-picker .sp-headline {
      font-size: 30px;
      letter-spacing: 14px;
      color: #e6f3ff;
      text-shadow: 0 0 22px rgba(60, 140, 220, 0.7), 0 1px 0 rgba(0, 0, 0, 0.8);
      margin-top: -36px;
    }
    #side-picker .sp-cards {
      display: flex;
      gap: 48px;
      align-items: stretch;
    }
    .sp-card {
      position: relative;
      width: 340px;
      padding: 26px 28px 30px;
      background:
        repeating-linear-gradient(60deg, transparent 0 18px, rgba(255, 255, 255, 0.018) 18px 19px),
        repeating-linear-gradient(-60deg, transparent 0 18px, rgba(255, 255, 255, 0.018) 18px 19px),
        linear-gradient(180deg, #2a323d 0%, #161a22 45%, #0a0d13 100%);
      border: 2px solid #2b4d72;
      color: #d8ecff;
      cursor: pointer;
      text-align: center;
      transition: transform 0.15s ease-out, border-color 0.15s, box-shadow 0.15s;
      box-shadow:
        0 0 24px rgba(0, 160, 240, 0.45),
        0 1px 0 rgba(255, 255, 255, 0.10) inset,
        0 -1px 0 rgba(0, 0, 0, 0.55) inset,
        0 0 32px rgba(0, 160, 240, 0.45) inset;
    }
    .sp-card.att {
      background:
        repeating-linear-gradient(60deg, transparent 0 18px, rgba(255, 255, 255, 0.018) 18px 19px),
        repeating-linear-gradient(-60deg, transparent 0 18px, rgba(255, 255, 255, 0.018) 18px 19px),
        linear-gradient(180deg, #2a323d 0%, #161a22 45%, #0a0d13 100%);
      border-color: #7a2630;
      color: #ffdadc;
      box-shadow:
        0 0 24px rgba(230, 70, 70, 0.45),
        0 1px 0 rgba(255, 255, 255, 0.10) inset,
        0 -1px 0 rgba(0, 0, 0, 0.55) inset,
        0 0 32px rgba(230, 70, 70, 0.45) inset;
    }
    .sp-card:hover {
      transform: translateY(-3px);
      border-color: #6ac4ff;
      box-shadow:
        0 0 36px rgba(0, 160, 240, 0.45),
        0 1px 0 rgba(255, 255, 255, 0.10) inset,
        0 -1px 0 rgba(0, 0, 0, 0.55) inset,
        0 0 44px rgba(0, 160, 240, 0.45) inset;
    }
    .sp-card.att:hover {
      border-color: #ff8c8c;
      box-shadow:
        0 0 36px rgba(230, 70, 70, 0.45),
        0 1px 0 rgba(255, 255, 255, 0.10) inset,
        0 -1px 0 rgba(0, 0, 0, 0.55) inset,
        0 0 44px rgba(230, 70, 70, 0.45) inset;
    }
    .sp-card .sp-team-name {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 8px;
      color: #6ac4ff;
      text-shadow: 0 0 14px rgba(0, 160, 240, 0.45);
      margin-bottom: 4px;
    }
    .sp-card.att .sp-team-name {
      color: #ff8c8c;
      text-shadow: 0 0 14px rgba(230, 70, 70, 0.45);
    }
    .sp-card .sp-role {
      font-size: 10px;
      letter-spacing: 3px;
      color: #8aaecc;
      margin-bottom: 22px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(106, 196, 255, 0.20);
    }
    .sp-card.att .sp-role {
      color: #cc9494;
      border-bottom-color: rgba(255, 140, 140, 0.20);
    }
    .sp-card .sp-hero {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 0 auto 22px;
      background:
        radial-gradient(ellipse at 50% 45%, rgba(50, 70, 100, 0.30) 0%, rgba(0, 0, 0, 0.85) 75%),
        linear-gradient(180deg, #050810 0%, #020407 100%);
      border: 1px solid #2a3140;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 3px 6px rgba(0, 0, 0, 0.55) inset,
        0 0 18px rgba(0, 160, 240, 0.45);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .sp-card.att .sp-hero {
      background:
        radial-gradient(ellipse at 50% 45%, rgba(100, 50, 50, 0.30) 0%, rgba(0, 0, 0, 0.85) 75%),
        linear-gradient(180deg, #100408 0%, #060203 100%);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 3px 6px rgba(0, 0, 0, 0.55) inset,
        0 0 18px rgba(230, 70, 70, 0.45);
    }
    .sp-card .sp-hero img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transform: scale(1.4);
    }
    .sp-card .sp-tagline {
      font-size: 12px;
      letter-spacing: 1.5px;
      line-height: 1.6;
      color: #8aaecc;
      margin-bottom: 22px;
      min-height: 40px;
    }
    .sp-card.att .sp-tagline { color: #cc9494; }
    .sp-card .sp-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      font-family: inherit;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 5px;
      color: #d8ecff;
      background: linear-gradient(180deg, #143a60 0%, #082040 60%, #03101e 100%);
      border: 2px solid #6ac4ff;
      box-shadow:
        0 0 0 1px rgba(108, 196, 255, 0.25) inset,
        0 1px 0 rgba(255, 255, 255, 0.12) inset,
        0 -2px 4px rgba(0, 0, 0, 0.40) inset,
        0 0 14px rgba(0, 160, 240, 0.45);
    }
    .sp-card.att .sp-cta {
      color: #ffdadc;
      background: linear-gradient(180deg, #5a121c 0%, #2a0408 60%, #100204 100%);
      border-color: #ff8c8c;
      box-shadow:
        0 0 0 1px rgba(255, 138, 138, 0.25) inset,
        0 1px 0 rgba(255, 255, 255, 0.12) inset,
        0 -2px 4px rgba(0, 0, 0, 0.40) inset,
        0 0 14px rgba(230, 70, 70, 0.45);
    }
    .sp-card:hover .sp-cta { box-shadow:
      0 0 0 1px rgba(108, 196, 255, 0.50) inset,
      0 1px 0 rgba(255, 255, 255, 0.16) inset,
      0 -2px 4px rgba(0, 0, 0, 0.40) inset,
      0 0 22px rgba(0, 160, 240, 0.45);
    }
    .sp-card.att:hover .sp-cta { box-shadow:
      0 0 0 1px rgba(255, 138, 138, 0.50) inset,
      0 1px 0 rgba(255, 255, 255, 0.16) inset,
      0 -2px 4px rgba(0, 0, 0, 0.40) inset,
      0 0 22px rgba(230, 70, 70, 0.45);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
