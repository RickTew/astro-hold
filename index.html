<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstroHold</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }

    #hud {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      font-family: 'Courier New', monospace;
      color: #cce8ff;
    }
    #hud * { pointer-events: auto; }

    /* ── Top bar (BUILD + PLAN) ─────────────────────────────────────────── */
    /* Three-column strip: ROBOTS panel (L) · centre controls (READY/PLAN)
       · CYBORGS panel (R). Sits at the top so the battlefield below stays
       unobstructed. Background gradient + clipped corners give it the
       sci-fi command-deck feel from the mockup. */
    #top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: stretch;
      gap: 14px;
      padding: 10px 14px 12px;
      background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.45) 80%, transparent 100%);
      pointer-events: none;
    }
    #top-bar > * { pointer-events: auto; }

    .team-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px 12px 10px;
      background:
        linear-gradient(180deg, rgba(8,20,40,0.92) 0%, rgba(4,10,22,0.88) 100%);
      border: 1px solid #1a4466;
      box-shadow: 0 0 16px rgba(0, 80, 160, 0.25) inset;
      /* Notched corners → command-deck silhouette */
      clip-path: polygon(
        12px 0,
        calc(100% - 12px) 0,
        100% 12px,
        100% calc(100% - 12px),
        calc(100% - 12px) 100%,
        12px 100%,
        0 calc(100% - 12px),
        0 12px
      );
    }
    .team-panel.att {
      background:
        linear-gradient(180deg, rgba(40,8,16,0.92) 0%, rgba(22,4,8,0.88) 100%);
      border-color: #661122;
      box-shadow: 0 0 16px rgba(160, 0, 40, 0.25) inset;
    }

    .team-panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(102, 170, 255, 0.25);
    }
    .team-panel.att .panel-header {
      border-bottom-color: rgba(255, 102, 102, 0.25);
    }
    .team-panel .team-name {
      font-size: 14px;
      color: #66aaff;
      text-shadow: 0 0 8px #0066cc;
    }
    .team-panel.att .team-name {
      color: #ff6666;
      text-shadow: 0 0 8px #cc0000;
    }
    .team-panel .team-credits {
      font-size: 13px;
      color: #aaddff;
    }
    .team-panel.att .team-credits { color: #ffaaaa; }

    .team-panel .panel-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
    }

    /* Icon shop button — image-led tile with label + cost beneath. */
    .shop-icon-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 4px 5px;
      cursor: pointer;
      background: #0a1e33;
      border: 1px solid #1a4466;
      color: #88bbdd;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      transition: background 0.1s, border-color 0.1s, box-shadow 0.1s;
    }
    .shop-icon-btn:hover {
      background: #102840;
      border-color: #2266aa;
      box-shadow: 0 0 8px rgba(0, 120, 200, 0.4);
    }
    .shop-icon-btn.selected {
      background: #0e3055;
      border-color: #00aaff;
      color: #00eeff;
      box-shadow: 0 0 10px rgba(0, 180, 255, 0.55);
    }
    .shop-icon-btn .icon {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(102, 170, 255, 0.25);
    }
    .shop-icon-btn .icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .shop-icon-btn .icon-wall {
      width: 32px;
      height: 32px;
      background: repeating-linear-gradient(
        45deg,
        #557799 0 4px,
        #334455 4px 8px
      );
      border: 1px solid #88aacc;
    }
    .shop-icon-btn .label {
      font-size: 11px;
      letter-spacing: 1px;
      color: inherit;
      white-space: nowrap;
    }
    .shop-icon-btn .cost {
      font-size: 10px;
      color: #99cc66;
    }
    .shop-icon-btn.selected .cost { color: #ccff99; }

    /* Cyborg side colours: warm-red palette to mirror the ROBOTS blue. */
    .team-panel.att .shop-icon-btn {
      background: #1a0008;
      border-color: #661122;
      color: #ddaaaa;
    }
    .team-panel.att .shop-icon-btn:hover {
      background: #2a0010;
      border-color: #aa2244;
      box-shadow: 0 0 8px rgba(200, 60, 80, 0.4);
    }
    .team-panel.att .shop-icon-btn.selected {
      background: #4a0014;
      border-color: #ff4466;
      color: #ffeeaa;
      box-shadow: 0 0 10px rgba(255, 90, 110, 0.55);
    }
    .team-panel.att .shop-icon-btn .icon {
      border-color: rgba(255, 102, 102, 0.25);
    }

    /* Preview pieces — single-angle pending full rotations. Dashed border
       so they're visually distinct from production. */
    .shop-icon-btn.preview {
      border-style: dashed;
      opacity: 0.75;
    }

    /* Insufficient credits — greyed out so failed placements aren't silent. */
    .shop-icon-btn.insufficient {
      opacity: 0.35;
      cursor: not-allowed;
      filter: grayscale(0.5);
    }

    /* Disabled state during PLAN phase — shops are visible but inert. */
    .team-panel.disabled .panel-grid {
      pointer-events: none;
      opacity: 0.55;
      filter: saturate(0.6);
    }

    /* ── Centre controls (phase label + READY/BATTLE button) ─────────────── */
    #center-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 10px;
      min-width: 180px;
    }
    #phase-display {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 4px;
      color: #66ccff;
      text-shadow: 0 0 10px #0088ff;
    }
    #battle-btn {
      background: linear-gradient(180deg, #4a0008 0%, #2a0000 100%);
      border: 2px solid #aa2200;
      color: #ffaa88;
      padding: 12px 36px;
      font-size: 22px;
      letter-spacing: 4px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      white-space: nowrap;
      transition: background 0.1s, border-color 0.1s, box-shadow 0.1s;
      box-shadow: 0 0 14px rgba(170, 34, 0, 0.5);
      clip-path: polygon(
        10px 0,
        calc(100% - 10px) 0,
        100% 50%,
        calc(100% - 10px) 100%,
        10px 100%,
        0 50%
      );
    }
    #battle-btn:hover {
      background: linear-gradient(180deg, #66001a 0%, #440000 100%);
      border-color: #ff4400;
      color: #ffddbb;
      box-shadow: 0 0 24px rgba(255, 68, 0, 0.8);
    }

    /* ── Plan-phase instruction strip (no longer holds the battle button) ── */
    #plan-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.5);
    }
    #plan-instructions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      font-family: 'Courier New', monospace;
      color: #99bbcc;
      font-size: 12px;
      line-height: 1.4;
      text-align: center;
    }
    #plan-instructions strong {
      color: #ffee66;
      letter-spacing: 2px;
      font-size: 13px;
    }

    /* Selected-piece panel during planning — sits just below the top bar
       on the right so it doesn't overlap the CYBORGS panel header. */
    #plan-selection {
      position: absolute;
      top: 150px;
      right: 16px;
      width: 240px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.78);
      border: 1px solid #335577;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #aaccdd;
      line-height: 1.5;
    }
    .plan-sel-header {
      font-size: 13px;
      letter-spacing: 1px;
      margin-bottom: 4px;
      text-shadow: 0 0 6px currentColor;
    }
    .plan-sel-ap {
      color: #ffee88;
      margin-bottom: 6px;
    }
    .plan-sel-ap strong { color: #fff; font-size: 14px; }
    .plan-sel-queue {
      color: #88aabb;
      font-size: 11px;
      padding-top: 4px;
      border-top: 1px solid #334455;
    }
    .plan-sel-queue em { color: #556677; }

    /* Compass-rose popup — opens with shift+click on a placed firing structure
       during BUILD. Lets the player pay credits to add extra fire-arc facings.
       Positioned absolutely; Game projects the structure's world position to
       screen coords and pins the rose there on open. */
    #compass-rose {
      position: absolute;
      transform: translate(-50%, -50%);
      display: grid;
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: auto repeat(3, 44px);
      gap: 4px;
      padding: 8px;
      background: rgba(0, 8, 20, 0.92);
      border: 1px solid #2266aa;
      box-shadow: 0 0 18px rgba(0, 80, 160, 0.45);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: #aaccdd;
    }
    #compass-rose .rose-title {
      grid-column: 1 / 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #88ccff;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    #compass-rose .rose-title span { flex: 1; text-align: center; }
    #compass-rose .rose-close-btn {
      width: 20px; height: 20px;
      padding: 0;
      background: transparent;
      border: 1px solid #335577;
      color: #99bbcc;
      font-family: inherit;
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }
    #compass-rose .rose-close-btn:hover {
      background: #2a0010;
      border-color: #aa2244;
      color: #ffbbbb;
    }
    #compass-rose .rose-footer {
      grid-column: 1 / 4;
      margin-top: 4px;
      display: flex; justify-content: center;
    }
    #compass-rose .rose-refund-btn {
      flex: 1;
      padding: 6px 8px;
      background: #2a0008;
      border: 1px solid #661122;
      color: #ddaaaa;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
    }
    #compass-rose .rose-refund-btn:hover {
      background: #440010;
      border-color: #aa2244;
      color: #ffbbbb;
    }
    #compass-rose .rose-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px;
      cursor: pointer;
      background: #0a1e33;
      border: 1px solid #1a4466;
      color: #88bbdd;
      font-family: inherit;
      font-size: 13px;
      line-height: 1;
    }
    #compass-rose .rose-btn:hover { background: #102840; border-color: #2266aa; }
    #compass-rose .rose-btn.active {
      background: #0e3055;
      border-color: #00aaff;
      color: #00eeff;
      cursor: default;
      text-shadow: 0 0 6px #00aaff;
    }
    #compass-rose .rose-btn.unaffordable {
      opacity: 0.4;
      cursor: not-allowed;
      filter: grayscale(0.4);
    }
    #compass-rose .rose-btn .rose-arrow { font-size: 16px; line-height: 1; }
    #compass-rose .rose-btn .rose-cost  { font-size: 9px; color: #99cc66; }
    #compass-rose .rose-btn .rose-on    { font-size: 8px; color: #66ccff; letter-spacing: 1px; }
    #compass-rose .rose-center {
      background: transparent;
      border: 1px dashed #335577;
      color: #6699bb;
      font-size: 9px;
      display: flex; align-items: center; justify-content: center;
      cursor: default;
    }

    /* Combat history log — wide bottom strip during BATTLE. The mock-up
       command-deck look: dark frame, clipped corners, D&D-style coloured
       rows. Hidden during BUILD/PLAN (the top bar already busy enough). */
    #combat-log {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      width: min(1000px, calc(100vw - 32px));
      max-height: 26vh;
      padding: 10px 16px;
      background: linear-gradient(180deg, rgba(8,12,20,0.92) 0%, rgba(0,4,10,0.88) 100%);
      border: 1px solid #224466;
      box-shadow: 0 0 14px rgba(0, 80, 160, 0.25) inset;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #99bbcc;
      overflow-y: auto;
      scrollbar-width: thin;
      clip-path: polygon(
        10px 0,
        calc(100% - 10px) 0,
        100% 10px,
        100% calc(100% - 10px),
        calc(100% - 10px) 100%,
        10px 100%,
        0 calc(100% - 10px),
        0 10px
      );
    }
    #combat-log .log-turn {
      color: #ffcc66;
      font-weight: bold;
      letter-spacing: 1px;
      margin: 6px 0 4px;
      border-bottom: 1px dashed #443322;
      padding-bottom: 2px;
    }
    #combat-log .log-turn:first-child { margin-top: 0; }
    #combat-log .log-entry { padding: 1px 0; }
    #combat-log .log-entry.defender { color: #88bbdd; }
    #combat-log .log-entry.attacker { color: #dd8888; }
    #combat-log .log-entry.neutral  { color: #ffaa44; font-weight: bold; }
    #combat-log .log-empty { color: #556677; font-style: italic; }

    #game-message {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 52px;
      letter-spacing: 6px;
      text-shadow: 0 0 24px currentColor;
      pointer-events: none;
      text-align: center;
    }
    #game-message small {
      display: block;
      font-size: 16px;
      letter-spacing: 2px;
      margin-top: 12px;
      opacity: 0.7;
    }

    #loading-screen {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
      letter-spacing: 3px;
      color: #4488aa;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
